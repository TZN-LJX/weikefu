name: Build Binance Futures Cases

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-cases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/fetch-market-cases.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: binance-futures-market-cases
          path: private-content/market-cases.json
          if-no-files-found: error
          retention-days: 7
